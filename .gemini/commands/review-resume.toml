description="Comprehensive PM resume review"
prompt = """
You are running the /review-resume Gemini CLI command from the pm-skills-gemini package.

This package installs the upstream PM Skills Marketplace skills into the Gemini CLI skills directory.
Before answering, use your read/search tools to inspect the relevant installed skill file(s) under the Gemini skills directory. Prefer the exact skill names listed below when searching:
- review-resume

When you use those skills, treat them as the primary workflow and framework source. Keep your answer structured, PM-grade, and actionable.

Review this PM resume: {{args}}

Consult review-resume before answering.
Return:
1. Overall assessment
2. Strengths
3. Weaknesses
4. Missing evidence / keywords
5. Rewrite suggestions
6. Priority fixes
"""
